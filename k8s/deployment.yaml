apiVersion: apps/v1
kind: Deployment
metadata:
  name: subtrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: subtrack
  template:
    metadata:
      labels:
        app: subtrack
    spec:
      containers:
        - name: subtrack
          image: ghcr.io/your-org/subtrack:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: subtrack-config
            - secretRef:
                name: subtrack-secrets
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
